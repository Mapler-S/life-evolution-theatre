name: Deploy to GitHub Pages

on:
  # 推到 main 分支时自动部署
  push:
    branches: [main]
  # 支持在 Actions 页面手动触发
  workflow_dispatch:

# GITHUB_TOKEN 权限：读仓库 + 写 Pages + 申请 OIDC token
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署，新推送会排队；不取消进行中的运行，避免部分部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # GitHub Pages 对以 _ 开头的文件默认忽略（Jekyll 语义）。
      # 加一个空的 .nojekyll 关掉 Jekyll 处理，保证 Vite 产出的资源能被访问。
      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
